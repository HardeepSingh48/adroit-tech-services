server {
    listen 80;
    server_name localhost;

    # Serve main frontend site
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Serve career portal site under subpath
    location /portal {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /portal/index.html;
    }
}
